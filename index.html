<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龍騰文化 - 職涯潛力探索</title>
    <!-- 引入 Tailwind CSS 與 React -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 隱藏捲軸但保留滑動功能 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 自訂 select 的下拉箭頭，蓋掉 iOS 預設樣式 */
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.2em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyuORP37J-dRdXe8OSb2OJaoiPA9ByjI_4r7tJ34H1_MdJQNQcR-p5Fie1xVBcspwmptQ/exec";

        const mbtiData = {
            INTJ: { title: '建築師', imageUrl: './img/MBTI_INTJ.jpg', jobs: ['數位產品企劃', '科目產品企劃'], desc: '富有想像力和戰略性的思想家，一切皆在計劃之中。' },
            INTP: { title: '邏輯學家', imageUrl: './img/MBTI_INTP.jpg', jobs: ['數位產品企劃', '數位編輯'], desc: '具有創造力的發明家，對知識有著不可遏制的渴望。' },
            ENTJ: { title: '指揮官', imageUrl: './img/MBTI_ENTJ.jpg', jobs: ['數位產品企劃', '科目產品企劃'], desc: '大膽、富有想像力且意志強大的領導者，總能找到或創造解決方法。' },
            ENTP: { title: '辯論家', imageUrl: './img/MBTI_ENTP.jpg', jobs: ['數位行銷', '數位產品企劃'], desc: '聰明好奇的思想者，無法抗拒智力挑戰。' },
            INFJ: { title: '提倡者', imageUrl: './img/MBTI_INFJ.jpg', jobs: ['科目編輯', '數位編輯'], desc: '安靜而神秘，但同時也是非常鼓舞人心且不知疲倦的理想主義者。' },
            INFP: { title: '調停者', imageUrl: './img/MBTI_INFP.jpg', jobs: ['數位編輯', '科目編輯'], desc: '富有詩意、善良的利他主義者，總是熱衷於幫助正義事業。' },
            ENFJ: { title: '主人公', imageUrl: './img/MBTI_ENFJ.jpg', jobs: ['科目產品企劃', '數位行銷'], desc: '充滿魅力與啟發性的領導者，能夠讓聽眾為之著迷。' },
            ENFP: { title: '競選者', imageUrl: './img/MBTI_ENFP.jpg', jobs: ['數位行銷', '數位編輯'], desc: '熱情、有創造力、愛社交的自由靈魂，總能找到微笑的理由。' },
            ISTJ: { title: '物流師', imageUrl: './img/MBTI_ISTJ.jpg', jobs: ['科目編輯', '數位產品企劃'], desc: '注重實用和事實，可靠性不容懷疑。' },
            ISFJ: { title: '守護者', imageUrl: './img/MBTI_ISFJ.jpg', jobs: ['科目編輯', '數位編輯'], desc: '非常專注且溫暖的保護者，隨時準備保護他們所愛的人。' },
            ESTJ: { title: '管理者', imageUrl: './img/MBTI_ESTJ.jpg', jobs: ['科目產品企劃', '科目編輯'], desc: '優秀的管理者，在管理事物或人方面無與倫比。' },
            ESFJ: { title: '執政官', imageUrl: './img/MBTI_ESFJ.jpg', jobs: ['科目產品企劃', '數位行銷'], desc: '極度關心他人、合群且受歡迎的人，總是熱心提供幫助。' },
            ISTP: { title: '鑑賞家', imageUrl: './img/MBTI_ISTP.jpg', jobs: ['數位產品企劃', '數位編輯'], desc: '大膽而實用的實驗者，掌握所有工具的使用。' },
            ISFP: { title: '探險家', imageUrl: './img/MBTI_ISFP.jpg', jobs: ['數位編輯', '科目編輯'], desc: '靈活且迷人的藝術家，時刻準備探索體驗新事物。' },
            ESTP: { title: '企業家', imageUrl: './img/MBTI_ESTP.jpg', jobs: ['數位行銷', '數位產品企劃'], desc: '聰明、精力充沛且極具洞察力，真正喜歡生活在邊緣。' },
            ESFP: { title: '表演者', imageUrl: './img/MBTI_ESFP.jpg', jobs: ['數位行銷', '數位編輯'], desc: '自發、精力充沛且熱情的人，周圍總是不乏歡樂。' },
        };

        const Icon = ({ name, className }) => {
            const icons = {
                user: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                book: <><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>,
                phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>,
                sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                smile: <><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></>,
                external: <><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>,
                arrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            const [view, setView] = useState('form'); 
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const [formData, setFormData] = useState({ name: '', major: '', mbti: '', phone: '' });

            const showMessage = (msg) => {
                setMessage(msg);
                setTimeout(() => setMessage(''), 3000);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                if (!formData.mbti) {
                    showMessage("請選擇您的 MBTI 類型！");
                    return;
                }

                setLoading(true);
                try {
                    if (GOOGLE_SHEET_URL) {
                        await fetch(GOOGLE_SHEET_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(formData)
                        });
                    }
                    setView('result');
                    window.scrollTo(0,0);
                } catch (error) {
                    showMessage("連線不穩定，請檢查網路連線後重試。");
                } finally {
                    setLoading(false);
                }
            };

            const handleReset = () => {
                setFormData({ name: '', major: '', mbti: '', phone: '' });
                setView('form');
                window.scrollTo(0,0);
            };

            const renderForm = () => (
                <div className="w-full bg-white md:rounded-3xl shadow-none md:shadow-2xl overflow-hidden animate-fade-in">
                    <img 
                        src="./img/main_banner.jpg" 
                        alt="龍騰文化 職涯性格探索" 
                        className="w-full h-auto max-h-[40vh] md:max-h-[50vh] lg:max-h-[40vh] object-cover block"
                        onError={(e) => { 
                            if(!e.target.src.includes('placehold.co')) {
                                e.target.src = 'https://placehold.co/1080x720/ffffff/c92e27?text=主要Banner圖片';
                            }
                        }} 
                    />
                    
                    <form onSubmit={handleSubmit} className="p-8 md:p-12 lg:p-8 space-y-6">
                        <div className="space-y-4">
                            <div className="relative">
                                <Icon name="user" className="absolute left-4 top-4 text-gray-400 w-5 h-5" />
                                <input required type="text" name="name" value={formData.name} onChange={handleInputChange} className="pl-12 w-full rounded-xl border-gray-200 border-2 p-4 focus:border-[#c92e27] focus:ring-1 focus:ring-[#c92e27] outline-none transition-all bg-white" placeholder="填寫姓名" />
                            </div>
                            <div className="relative">
                                <Icon name="book" className="absolute left-4 top-4 text-gray-400 w-5 h-5" />
                                <input required type="text" name="major" value={formData.major} onChange={handleInputChange} className="pl-12 w-full rounded-xl border-gray-200 border-2 p-4 focus:border-[#c92e27] focus:ring-1 focus:ring-[#c92e27] outline-none transition-all bg-white" placeholder="就讀科系" />
                            </div>
                            <div className="relative">
                                <Icon name="phone" className="absolute left-4 top-4 text-gray-400 w-5 h-5" />
                                <input required type="tel" name="phone" value={formData.phone} onChange={handleInputChange} className="pl-12 w-full rounded-xl border-gray-200 border-2 p-4 focus:border-[#c92e27] focus:ring-1 focus:ring-[#c92e27] outline-none transition-all bg-white" placeholder="手機號碼" />
                            </div>
                            <div className="relative">
                                <Icon name="smile" className="absolute left-4 top-4 text-gray-400 w-5 h-5" />
                                <select required name="mbti" value={formData.mbti} onChange={handleInputChange} className="pl-12 w-full rounded-xl border-gray-200 border-2 p-4 focus:border-[#c92e27] focus:ring-1 focus:ring-[#c92e27] outline-none transition-all bg-white text-gray-700 custom-select cursor-pointer">
                                    <option value="" disabled>請選擇您的 MBTI 型態</option>
                                    {Object.keys(mbtiData).map(key => (
                                        <option key={key} value={key}>{key} - {mbtiData[key].title}</option>
                                    ))}
                                </select>
                            </div>
                        </div>

                        <div className="px-1 py-1">
                            <p className="text-[10px] text-gray-400 leading-relaxed text-left">
                                本資料僅供龍騰文化進行招募聯繫與內部統計使用，點擊「觀看專屬結果」即代表您同意上述條款。
                            </p>
                        </div>

                        <button type="submit" disabled={loading} className={`w-full flex items-center justify-center gap-2 bg-[#c92e27] hover:bg-[#a8251f] text-white font-bold py-4 px-4 rounded-2xl shadow-lg transition-all transform active:scale-95 text-lg ${loading ? 'opacity-70 cursor-not-allowed' : ''}`}>
                            <Icon name="sparkles" className="w-5 h-5" /> 
                            {loading ? '資料傳送中...' : '觀看專屬結果'}
                        </button>
                    </form>
                </div>
            );

            const renderResult = () => {
                const result = mbtiData[formData.mbti] || mbtiData['INTJ'];
                return (
                    <div className="w-full bg-white md:rounded-3xl shadow-none md:shadow-2xl overflow-hidden animate-fade-in">
                        
                        <img src={result.imageUrl} alt={formData.mbti} 
                             onError={(e) => { 
                                 if(!e.target.src.includes('placehold.co')) {
                                     e.target.src = 'https://placehold.co/1080x1440/ffffff/c92e27?text=' + formData.mbti + '+專屬結果卡';
                                 }
                             }}
                             className="w-full h-auto max-h-[85vh] lg:max-h-[75vh] object-contain bg-white block mx-auto" />
                        
                        <div className="p-6 md:p-10 lg:p-8 space-y-4 bg-white border-t lg:border-t-0 border-gray-50">
                            <a 
                                href="https://www.104.com.tw/company/au6siqw" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="w-full inline-flex items-center justify-center gap-2 bg-[#c92e27] hover:bg-[#a8251f] text-white font-bold py-4 px-4 rounded-xl shadow-md transition-all transform active:scale-95 text-lg tracking-wide"
                            >
                                歡迎加入我們 <Icon name="external" className="w-5 h-5 opacity-70" />
                            </a>

                            <button onClick={handleReset} className="flex items-center justify-center w-full gap-2 text-gray-400 hover:text-gray-600 font-medium transition py-2 text-base">
                                <Icon name="arrowLeft" className="w-4 h-4" /> 回到首頁重新填寫
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-[100dvh] bg-[#f3f4f6] font-sans flex flex-col">
                    {message && (
                        <div className="fixed top-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full z-50 animate-fade-in shadow-xl text-sm font-bold">
                            {message}
                        </div>
                    )}
                    
                    <div className="flex-grow flex flex-col justify-center items-center w-full px-0 md:px-6 py-0 md:py-12">
                        <div className="w-full max-w-md md:max-w-2xl lg:max-w-md my-auto bg-white md:bg-transparent">
                            {view === 'form' && renderForm()}
                            {view === 'result' && renderResult()}
                        </div>
                    </div>
                    
                    <div className="w-full text-center pb-6 pt-4 bg-white md:bg-transparent">
                        <p className="text-xs text-gray-400">2026 龍騰文化事業股份有限公司 © 版權所有</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
